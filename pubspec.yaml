name: uts_mobile
description: "E-Ticketing Helpdesk Mobile App - UTS Praktikum Mobile Apps."
publish_to: 'none'
version: 2.0.0+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  intl: ^0.19.0
  image_picker: ^1.0.7
  uuid: ^4.3.3
  fl_chart: ^0.67.0
  timeago: ^3.6.1
  cached_network_image: ^3.3.1
  flutter_staggered_animations: ^1.1.1
  lottie: ^3.1.0
  shimmer: ^3.0.0
  badges: ^3.1.2
  google_fonts: ^6.1.0
  supabase_flutter: ^2.8.4
  font_awesome_flutter: ^9.1.0
  cupertino_icons: ^1.0.2

flutter_launcher_icons:
  android: true
  ios: true
  image_path_ios: "assets/logo/ticketing-seven-eleven.png"
  image_path_android: "assets/logo/ticketing-seven-eleven.png"
  remove_alpha_ios: true

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
